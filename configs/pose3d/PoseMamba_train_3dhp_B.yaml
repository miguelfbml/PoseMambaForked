# PoseMamba-B training config for MPI-INF-3DHP
# Use with: python train_3dhp.py --config configs/pose3d/PoseMamba_train_3dhp_B.yaml
#
# Data files required in data_root:
#   data_train_3dhp.npz
#   data_test_3dhp.npz
# (Follow MotionAGFormer/data/preprocess/ to generate these from the raw 3DHP dataset)

# General
no_eval: False
finetune: False
partial_train: null

# Training
epochs: 90
checkpoint_frequency: 10
batch_size: 16
dropout: 0.0
learning_rate: 0.0005
weight_decay: 0.01
lr_decay: 0.99

# Model  (must match PoseMamba-B architecture in lib/model/PoseMamba.py)
backbone: "PoseMamba"
maxlen: 81       # temporal dimension – must equal n_frames
dim_feat: 128
mlp_ratio: 2
depth: 10

# Data
data_root: data/motion3d/
n_frames: 81     # sequence length fed to the model
stride: 9        # stride for chunking training sequences
no_conf: True    # remove confidence channel (input is x,y only, matching in_chans=2)
flip: True       # horizontal-flip augmentation during training

# Loss weights  (same structure as H36M config)
lambda_3d: 1.0
lambda_scale: 0.5
lambda_3d_velocity: 20.0
lambda_lv: 0.0
lambda_lg: 0.0
lambda_a: 0.0
lambda_av: 0.0
lambda_3dw: 0.0   # weighted MPJPE – disabled (joint ordering differs from H36M)
lambda_diff: 0.5  # temporal consistency
